# 本番自動デプロイ（Issue #23 / competitive-daily-summary task 6.3 / agency-dashboard task 5.1 の CI 化フォロー）
#
# main への push で ts-ci が緑になった後、5イメージ
# （daily-batch / summary-delivery / store-detail / dashboard-api / dashboard-web）を
# build → Artifact Registry へ push → Cloud Run へ image-only 反映する。gcp-auth-smoke.yml の
# Direct WIF 雛形を踏襲（service_account 入力なし・SA JSON キー不使用）。
#
# CI デプロイ契約（gcp-auth-smoke.yml と同一・厳守）:
#   - イメージ更新のみ（gcloud run services/jobs update --image）。
#   - 構成変更（env・scaling・resource）は Terraform 専権。gcloud run deploy は使わない。
#   - terraform state には触れない。
#
# 必要な GitHub リポジトリ変数（vars.*・いずれも非秘匿）:
#   vars.WIF_PROVIDER        = terraform output wif_provider_name
#   vars.GCP_PROJECT_ID      = gen-fw-line-meo
#   vars.NEXT_PUBLIC_LIFF_ID = tfvars の liff_id と同値（store-detail の build-arg。Next.js は
#                              next build 時にクライアントバンドルへインライン化するため、
#                              Cloud Run のランタイム env では反映されない＝ビルド時に渡す必要がある）
#   vars.NEXT_PUBLIC_API_BASE_URL         = dashboard-web が叩く dashboard-api の URL（build-arg）
#   vars.NEXT_PUBLIC_FIREBASE_API_KEY     = dashboard-web の Firebase Web SDK 設定（build-arg）
#   vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN = 同上（build-arg）
#   vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID  = 同上（build-arg。いずれも store-detail の LIFF ID と同理由で
#                                           next build 時にクライアントバンドルへインライン化される）
name: deploy-prod

on:
  # ts-ci（lint/build/test・E2E・Lighthouse）が main で成功したら反映（テスト赤のまま出荷しない）。
  workflow_run:
    workflows: [ts-ci]
    types: [completed]
    branches: [main]
  # 初回検証・手動再デプロイ用。
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # WIF の OIDC トークン発行に必須

jobs:
  deploy:
    # workflow_run 経由はテスト成功時のみ。workflow_dispatch（手動）は無条件で実行。
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout（検証済みコミットを反映）
        uses: actions/checkout@v5
        with:
          # workflow_run 時は ts-ci が緑になった正確な commit を反映する。
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: TAG を確定（git 短SHA・push と反映で一致させる）
        id: meta
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud (Direct WIF, no SA key)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Build & push 5 images（store-detail / dashboard-web は NEXT_PUBLIC_* を build-arg で焼き込み）
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REGION: asia-northeast1
          REPOSITORY: fwlm
          TAG: ${{ steps.meta.outputs.tag }}
          NEXT_PUBLIC_LIFF_ID: ${{ vars.NEXT_PUBLIC_LIFF_ID }}
          NEXT_PUBLIC_API_BASE_URL: ${{ vars.NEXT_PUBLIC_API_BASE_URL }}
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ vars.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
        # push-images.sh 内で gcloud auth configure-docker → docker build（build-arg）→ push。
        # NEXT_PUBLIC_LIFF_ID 未設定なら store-detail の push を、dashboard-web の NEXT_PUBLIC_* が
        # 1つでも未設定なら dashboard-web の push を hard-fail（空焼き込みを構造的に防止）。
        run: scripts/push-images.sh

      - name: Reflect images to Cloud Run（image-only update・契約遵守）
        env:
          IMAGE_BASE: asia-northeast1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/fwlm
          TAG: ${{ steps.meta.outputs.tag }}
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          set -euo pipefail
          gcloud run jobs update daily-batch \
            --image="${IMAGE_BASE}/daily-batch:${TAG}" \
            --region=asia-northeast1 --project="${PROJECT_ID}"
          gcloud run jobs update summary-delivery \
            --image="${IMAGE_BASE}/summary-delivery:${TAG}" \
            --region=asia-northeast1 --project="${PROJECT_ID}"
          gcloud run services update store-detail \
            --image="${IMAGE_BASE}/store-detail:${TAG}" \
            --region=asia-northeast1 --project="${PROJECT_ID}"
          gcloud run services update dashboard-api \
            --image="${IMAGE_BASE}/dashboard-api:${TAG}" \
            --region=asia-northeast1 --project="${PROJECT_ID}"
          gcloud run services update dashboard-web \
            --image="${IMAGE_BASE}/dashboard-web:${TAG}" \
            --region=asia-northeast1 --project="${PROJECT_ID}"
